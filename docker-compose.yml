services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      - POSTGRES_DB=mem0
      - POSTGRES_USER=mem0
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    networks:
      - engram-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mem0"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1g
      - NEO4J_server_memory_pagecache__size=256m
    volumes:
      - neo4j-data:/data
    networks:
      - engram-net
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  mem0:
    build:
      context: ./mem0-custom
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - DATABASE_URL=postgresql://mem0:${POSTGRES_PASSWORD}@postgres:5432/mem0
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - engram-net

  vault-sync:
    build:
      context: ./vault-sync
    restart: unless-stopped
    environment:
      - MEM0_API_URL=http://mem0:8000
      - VAULT_PATH=/vault
      - USER_ID=${USER_ID}
    volumes:
      - ${VAULT_PATH}:/vault:ro
    networks:
      - engram-net
    depends_on:
      - mem0

volumes:
  pgvector-data:
  neo4j-data:

networks:
  engram-net:
